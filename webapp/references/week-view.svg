  <rect x="300" y="156" width="120" height="440" fill="white"/>
  <rect x="420" y="156" width="120" height="440" fill="white"/>
  <rect x="540" y="156" width="120" height="440" fill="white"/>
  <rect x="660" y="156" width="120" height="440" fill="white"/>
