  <!-- Nav: month/week toggle -->
  <rect x="680" y="14" width="72" height="28" rx="4" fill="#444"/>
  <text x="716" y="32" fill="#aaa" font-size="13" text-anchor="middle">Month</text>
  <rect x="756" y="14" width="72" height="28" rx="4" fill="#7c6af7"/>
