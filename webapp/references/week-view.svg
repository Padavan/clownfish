  <text x="198" y="180" fill="white" font-size="11" font-weight="600">Kanji set 1</text>
  <text x="198" y="194" fill="#c8f0e2" font-size="10">SM-2 · day 13</text>
  <rect x="198" y="202" width="56" height="18" rx="3" fill="white" fill-opacity="0.2"/>
  <text x="226" y="214" fill="white" font-size="10" text-anchor="middle">✓ Complete</text>

