  <text x="106" y="274" fill="white" font-size="10" text-anchor="middle">✓ Complete</text>

  <!-- Event 3: completed -->
  <rect x="68" y="284" width="104" height="36" rx="5" fill="#e8e8e8"/>
  <text x="78" y="300" fill="#aaa" font-size="11" font-weight="600" text-decoration="line-through">Grammar drill</text>
  <text x="78" y="313" fill="#bbb" font-size="10">Completed</text>

