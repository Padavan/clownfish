  <text x="170" y="605" fill="#666" font-size="11">Last: completed "Grammar drill" (Mon 20)</text>

  <!-- Left gutter label -->
  <rect x="0" y="108" width="60" height="488" fill="#f0f0f0"/>
  <text x="30" y="596" fill="#bbb" font-size="10" text-anchor="middle">+</text>

  <!-- Bottom border -->
  <rect width="900" height="1" y="579" fill="#444"/>
  <rect width="900" height="1" y="107" fill="#ddd"/>

</svg>
