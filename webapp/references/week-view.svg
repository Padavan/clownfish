  <rect x="308" y="164" width="104" height="52" rx="5" fill="#7c6af7"/>
  <text x="318" y="180" fill="white" font-size="11" font-weight="600">Review Ch.3</text>
  <text x="318" y="194" fill="#d4ceff" font-size="10">Fibonacci · day 13</text>
  <rect x="318" y="202" width="56" height="18" rx="3" fill="white" fill-opacity="0.2"/>
  <text x="346" y="214" fill="white" font-size="10" text-anchor="middle">✓ Complete</text>

  <!-- ── FRI 24 events ── -->
  <rect x="548" y="164" width="104" height="52" rx="5" fill="#f7a23a"/>
  <text x="558" y="180" fill="white" font-size="11" font-weight="600">Vocab set B</text>
  <text x="558" y="194" fill="#fff3dd" font-size="10">Doubling · day 8</text>
  <rect x="558" y="202" width="56" height="18" rx="3" fill="white" fill-opacity="0.2"/>
  <text x="586" y="214" fill="white" font-size="10" text-anchor="middle">✓ Complete</text>

  <!-- ── SAT 25 events ── -->
  <rect x="668" y="164" width="104" height="52" rx="5" fill="#4caf8a"/>
  <text x="678" y="180" fill="white" font-size="11" font-weight="600">Kanji set 1</text>
  <text x="678" y="194" fill="#c8f0e2" font-size="10">SM-2 · day 21</text>
  <rect x="678" y="202" width="56" height="18" rx="3" fill="white" fill-opacity="0.2"/>
  <text x="706" y="214" fill="white" font-size="10" text-anchor="middle">✓ Complete</text>

  <!-- Bottom bar: undo -->
