<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" font-family="system-ui, sans-serif">

  <!-- Background -->
  <rect width="900" height="620" fill="#f8f8f8"/>

  <!-- Header bar -->
  <rect width="900" height="56" fill="#2c2c2c"/>
