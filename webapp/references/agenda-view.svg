  <text x="24" y="462" fill="#aaa" font-size="11" font-weight="600" letter-spacing="1">UPCOMING</text>

  <!-- Upcoming slim rows -->
  <!-- Apr 21 -->
  <rect x="16" y="472" width="448" height="44" rx="8" fill="white" stroke="#efefef" stroke-width="1"/>
  <circle cx="40" cy="494" r="5" fill="#4caf8a"/>
  <text x="54"  y="498" fill="#555" font-size="13">Kanji set 1</text>
  <text x="350" y="498" fill="#bbb" font-size="12" text-anchor="end">Tomorrow · Apr 21</text>

  <!-- Apr 22 -->
  <rect x="16" y="522" width="448" height="44" rx="8" fill="white" stroke="#efefef" stroke-width="1"/>
  <circle cx="40" cy="544" r="5" fill="#7c6af7"/>
  <text x="54"  y="548" fill="#555" font-size="13">Review Chapter 3</text>
  <text x="350" y="548" fill="#bbb" font-size="12" text-anchor="end">Wed · Apr 22</text>

  <!-- Apr 24 -->
  <rect x="16" y="572" width="448" height="44" rx="8" fill="white" stroke="#efefef" stroke-width="1"/>
  <circle cx="40" cy="594" r="5" fill="#f7a23a"/>
  <text x="54"  y="598" fill="#555" font-size="13">Vocab set B</text>
  <text x="350" y="598" fill="#bbb" font-size="12" text-anchor="end">Fri · Apr 24</text>

  <!-- Bottom bar -->
  <rect width="480" height="1" y="639" fill="#ddd"/>
  <rect width="480" height="60" y="640" fill="white"/>

  <!-- Tab bar -->
  <!-- Agenda (active) -->
  <text x="60"  y="676" fill="#7c6af7" font-size="10" text-anchor="middle" font-weight="600">▦</text>
  <text x="60"  y="690" fill="#7c6af7" font-size="10" text-anchor="middle">Agenda</text>

  <!-- Week -->
