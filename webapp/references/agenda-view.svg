  <!-- Month -->
  <text x="260" y="676" fill="#bbb" font-size="10" text-anchor="middle">▦</text>
  <text x="260" y="690" fill="#bbb" font-size="10" text-anchor="middle">Month</text>

  <!-- Add -->
  <circle cx="400" cy="670" r="22" fill="#7c6af7"/>
  <text x="400" y="677" fill="white" font-size="22" text-anchor="middle" font-weight="300">+</text>

  <!-- Undo snackbar -->
  <rect x="16" y="608" width="280" height="28" rx="6" fill="#333"/>
  <text x="28" y="626" fill="#ccc" font-size="11">↩  Undo: completed "Grammar drill"</text>

</svg>
