<svg xmlns="http://www.w3.org/2000/svg" width="480" height="720" font-family="system-ui, sans-serif">

  <!-- Background -->
  <rect width="480" height="720" fill="#f8f8f8"/>

  <!-- Header -->
  <rect width="480" height="52" fill="#2c2c2c"/>
