  <text x="34"  y="78"  fill="#666" font-size="10" text-anchor="middle">SAT</text>
  <text x="34"  y="96"  fill="#666" font-size="16" font-weight="400" text-anchor="middle">18</text>

  <!-- Sun 19 -->
  <rect x="62"  y="60" width="44" height="48" rx="8" fill="#333"/>
  <text x="84"  y="78"  fill="#666" font-size="10" text-anchor="middle">SUN</text>
  <text x="84"  y="96"  fill="#666" font-size="16" font-weight="400" text-anchor="middle">19</text>

  <!-- Mon 20 TODAY selected -->
  <rect x="112" y="58" width="52" height="52" rx="10" fill="#7c6af7"/>
  <text x="138" y="77"  fill="#d4ceff" font-size="10" text-anchor="middle">MON</text>
  <text x="138" y="97"  fill="white" font-size="18" font-weight="700" text-anchor="middle">20</text>

