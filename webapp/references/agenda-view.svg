  <circle cx="192" cy="104" r="3" fill="#4caf8a"/>

  <!-- Wed 22 -->
  <rect x="220" y="60" width="44" height="48" rx="8" fill="#333"/>
  <text x="242" y="78"  fill="#888" font-size="10" text-anchor="middle">WED</text>
