  <text x="84" y="202" fill="#888" font-size="12">Fibonacci · occurrence 4 of 9</text>
  <text x="84" y="218" fill="#bbb" font-size="11">Next after complete: May 3 (+13 days)</text>
  <!-- move button -->
  <rect x="368" y="165" width="80" height="26" rx="5" fill="#f0eeff"/>
  <text x="408" y="182" fill="#7c6af7" font-size="11" text-anchor="middle">Move ›</text>

  <!-- ── Task card 2: pending ── -->
  <rect x="16" y="252" width="448" height="88" rx="10" fill="white" stroke="#e8e8e8" stroke-width="1"/>
  <rect x="16" y="252" width="6" height="88" rx="3" fill="#f7a23a"/>
  <circle cx="56" cy="296" r="18" fill="none" stroke="#f7a23a" stroke-width="2"/>
  <text x="84" y="284" fill="#222" font-size="15" font-weight="600">Vocab set B</text>
  <text x="84" y="302" fill="#888" font-size="12">Doubling · occurrence 3 of 7</text>
  <text x="84" y="318" fill="#bbb" font-size="11">Next after complete: Apr 24 (+4 days)</text>
  <rect x="368" y="265" width="80" height="26" rx="5" fill="#fff8ee"/>
  <text x="408" y="282" fill="#f7a23a" font-size="11" text-anchor="middle">Move ›</text>

  <!-- ── Task card 3: completed ── -->
  <rect x="16" y="352" width="448" height="88" rx="10" fill="#fafafa" stroke="#ececec" stroke-width="1"/>
  <rect x="16" y="352" width="6" height="88" rx="3" fill="#ccc"/>
  <!-- filled check -->
  <circle cx="56" cy="396" r="18" fill="#e0e0e0"/>
  <text x="56" y="402" fill="#aaa" font-size="18" text-anchor="middle" font-weight="300">✓</text>
  <text x="84" y="384" fill="#bbb" font-size="15" font-weight="600" text-decoration="line-through">Grammar drill</text>
  <text x="84" y="402" fill="#ccc" font-size="12">Fibonacci · completed at 09:14</text>
  <text x="84" y="418" fill="#ddd" font-size="11">Next: Apr 28 (+8 days)</text>

