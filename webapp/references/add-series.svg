<svg xmlns="http://www.w3.org/2000/svg" width="480" height="640" font-family="system-ui, sans-serif">

  <!-- Background -->
  <rect width="480" height="640" fill="#f8f8f8"/>

  <!-- Header -->
  <rect width="480" height="52" fill="#2c2c2c"/>
  <text x="20" y="32" fill="white" font-size="16" font-weight="600">spaced-cal</text>
  <!-- close / back -->
  <text x="450" y="32" fill="#888" font-size="20" text-anchor="middle">✕</text>

  <!-- Title -->
  <text x="24" y="84" fill="#333" font-size="17" font-weight="600">Add new series</text>

  <!-- Name field -->
  <text x="24" y="116" fill="#666" font-size="12" font-weight="500">NAME</text>
  <rect x="24" y="122" width="432" height="40" rx="6" fill="white" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="36" y="147" fill="#333" font-size="14">Review Chapter 3</text>
  <!-- cursor blink -->
  <rect x="174" y="131" width="1.5" height="18" fill="#7c6af7"/>

  <!-- Description field -->
  <text x="24" y="184" fill="#666" font-size="12" font-weight="500">DESCRIPTION (optional)</text>
  <rect x="24" y="190" width="432" height="60" rx="6" fill="white" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="36" y="212" fill="#aaa" font-size="14">Add a note…</text>

  <!-- Start date -->
  <text x="24" y="272" fill="#666" font-size="12" font-weight="500">START DATE</text>
  <rect x="24" y="278" width="200" height="40" rx="6" fill="white" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="36" y="303" fill="#333" font-size="14">2026-04-20</text>
  <text x="210" y="303" fill="#bbb" font-size="16">📅</text>

  <!-- Strategy picker -->
  <text x="24" y="342" fill="#666" font-size="12" font-weight="500">SPACING STRATEGY</text>

  <!-- Fibonacci (selected) -->
  <rect x="24"  y="350" width="136" height="64" rx="6" fill="#7c6af7" stroke="#7c6af7" stroke-width="2"/>
  <text x="92"  y="374" fill="white" font-size="13" font-weight="600" text-anchor="middle">Fibonacci</text>
  <text x="92"  y="390" fill="#d4ceff" font-size="10" text-anchor="middle">1 2 3 5 8 13…</text>
  <text x="92"  y="406" fill="#d4ceff" font-size="10" text-anchor="middle">Default</text>

  <!-- Doubling -->
  <rect x="172" y="350" width="136" height="64" rx="6" fill="white" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="240" y="374" fill="#555" font-size="13" font-weight="600" text-anchor="middle">Doubling</text>
  <text x="240" y="390" fill="#aaa" font-size="10" text-anchor="middle">1 2 4 8 16 32…</text>
  <text x="240" y="406" fill="#aaa" font-size="10" text-anchor="middle">Aggressive</text>

  <!-- SM-2 -->
  <rect x="320" y="350" width="136" height="64" rx="6" fill="white" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="388" y="374" fill="#555" font-size="13" font-weight="600" text-anchor="middle">SM-2</text>
  <text x="388" y="390" fill="#aaa" font-size="10" text-anchor="middle">Adaptive</text>
  <text x="388" y="406" fill="#aaa" font-size="10" text-anchor="middle">Anki-style</text>

  <!-- Preview: generated schedule -->
  <text x="24" y="438" fill="#666" font-size="12" font-weight="500">PREVIEW — SCHEDULED OCCURRENCES</text>
  <rect x="24" y="444" width="432" height="110" rx="6" fill="white" stroke="#e8e8e8" stroke-width="1"/>

  <!-- occurrence dots + dates -->
  <circle cx="50"  cy="474" r="5" fill="#7c6af7"/>
  <text x="62"  y="478" fill="#555" font-size="12">Apr 21</text>
  <text x="130" y="478" fill="#bbb" font-size="11">+1 day</text>

  <circle cx="50"  cy="496" r="5" fill="#7c6af7"/>
  <text x="62"  y="500" fill="#555" font-size="12">Apr 22</text>
  <text x="130" y="500" fill="#bbb" font-size="11">+2 days</text>

  <circle cx="50"  cy="518" r="5" fill="#7c6af7"/>
  <text x="62"  y="522" fill="#555" font-size="12">Apr 23</text>
  <text x="130" y="522" fill="#bbb" font-size="11">+3 days</text>

  <circle cx="270" cy="474" r="5" fill="#7c6af7"/>
  <text x="282" y="478" fill="#555" font-size="12">Apr 25</text>
  <text x="350" y="478" fill="#bbb" font-size="11">+5 days</text>

  <circle cx="270" cy="496" r="5" fill="#7c6af7"/>
  <text x="282" y="500" fill="#555" font-size="12">Apr 28</text>
  <text x="350" y="500" fill="#bbb" font-size="11">+8 days</text>

  <circle cx="270" cy="518" r="5" fill="#7c6af7"/>
  <text x="282" y="522" fill="#555" font-size="12">May 3</text>
  <text x="350" y="522" fill="#bbb" font-size="11">+13 days</text>

  <text x="36" y="546" fill="#bbb" font-size="11">… and 3 more occurrences</text>

  <!-- Action buttons -->
  <rect x="24"  y="572" width="200" height="44" rx="8" fill="white" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="124" y="599" fill="#888" font-size="14" font-weight="500" text-anchor="middle">Cancel</text>

  <rect x="236" y="572" width="220" height="44" rx="8" fill="#7c6af7"/>
  <text x="346" y="599" fill="white" font-size="14" font-weight="600" text-anchor="middle">Create series</text>

</svg>
